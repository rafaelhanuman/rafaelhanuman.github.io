<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js WebGPU Local</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; border-top: 5px solid #00d2ff;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 18px; letter-spacing: 2px; text-align: center; padding: 0 20px; }
    </style>

    <!-- O Import Map diz ao navegador onde encontrar o módulo "three" localmente -->
    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.module.js",
                "three/webgpu": "./js/three.webgpu.js"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Carregando Módulos WebGPU Locais...</div>
    </div>

    <!-- Script principal configurado como MODULE -->
    <script type="module">
        // Importando a biblioteca como módulo moderno
        import * as THREE from 'three';

        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');

        try {
            loaderText.innerText = "Inicializando WebGPU...";

            // 1. Configurar Cena e Câmera
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // 2. Criar o Renderizador Moderno 
            // Nota: Se a sua versão já usa o WebGPURenderer por padrão, usamos ele aqui
            let renderer;
            if (THREE.WebGPURenderer) {
                renderer = new THREE.WebGPURenderer({ antialias: true });
            } else {
                // Fallback caso seja o módulo padrão que gerencia WebGL/WebGPU internamente
                renderer = new THREE.WebGLRenderer({ antialias: true });
            }
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 3. Criar o Cubo
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // 4. Animação
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }

            // Esconder tela de loading e iniciar
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                animate();
            }, 600);

            // 5. Redimensionamento
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (error) {
            console.error(error);
            loaderText.innerHTML = "Erro ao iniciar o módulo 3D:<br><span style='color:#ff3333; font-size:14px;'>" + error.message + "</span>";
        }
    </script>
</body>
</html>
