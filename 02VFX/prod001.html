<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.WebGPU 100% Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Tela de Loading */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; 
            border-top: 5px solid #ffcc00; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 16px; letter-spacing: 2px; text-align: center; padding: 0 20px; line-height: 1.5; color: #ffcc00; }
    </style>

    <!-- Import Map aponta o atalho 'three' para o seu arquivo local na subpasta js -->
    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.webgpu.js"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Inicializando motor gráfico WebGPU local...</div>
    </div>

    <script type="module">
        // Importa a biblioteca diretamente do arquivo local mapeado acima
        import * as THREE from 'three';

        const loaderText = document.getElementById('loader-text');
        const loader = document.getElementById('loader');

        async function init() {
            try {
                // 1. Configurar Cena e Câmera
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                // 2. Criar o Renderizador WebGPU Assíncrono (Obrigatório nas novas versões)
                const renderer = new THREE.WebGPURenderer({ antialias: true });
                await renderer.init(); // Garante o carregamento do contexto WebGPU/WebGL2
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // 3. Criar o Cubo no centro da tela
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                // 4. Animação de Rotação contínua
                function animate() {
                    requestAnimationFrame(animate);
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }

                // Remove a tela de loading e inicia a animação do cubo
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                    animate();
                }, 400);

                // 5. Ajuste de Janela Responsivo
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                console.error(error);
                loaderText.innerHTML = "<span style='color:#ff3333; font-weight:bold;'>ERRO NO WEBGPU / SCRIPT:</span><br><br>" + 
                                       error.message + "<br><br>" +
                                       "<small style='color:#bbb;'>Verifique se o seu navegador suporta WebGPU e se o arquivo 'js/three.webgpu.js' está correto.</small>";
            }
        }

        // Inicia a aplicação
        init();
    </script>
</body>
</html>
