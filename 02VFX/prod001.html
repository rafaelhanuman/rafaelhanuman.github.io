<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 100% Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Tela de Loading */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        
        /* Carregador Amarelo */
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; 
            border-top: 5px solid #ffcc00; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 16px; letter-spacing: 2px; text-align: center; padding: 0 20px; line-height: 1.5; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Buscando arquivo 'js/three.js' no repositório...</div>
    </div>

    <!-- Carregamento estritamente local por script simples -->
    <script src="js/three.js" onerror="erroDeCarregamento()"></script>
    
    <script>
        const loaderText = document.getElementById('loader-text');
        const loader = document.getElementById('loader');

        // Dispara se o arquivo local NÃO estiver na pasta certa do GitHub
        function erroDeCarregamento() {
            loaderText.innerHTML = "<span style='color:#ff3333; font-weight:bold;'>ARQUIVO NÃO ENCONTRADO!</span><br><br>" +
                                   "O navegador não achou o arquivo <b style='color:#fff;'>js/three.js</b>.<br><br>" +
                                   "<small style='color:#bbb;'>Verifique se a pasta se chama 'js' e o arquivo 'three.js' (tudo minúsculo).</small>";
        }

        // Executa o cenário 3D
        window.addEventListener('load', () => {
            // Se a biblioteca não foi carregada localmente, impede o script de rodar e quebrar
            if (typeof THREE === 'undefined') return;

            try {
                loaderText.innerText = "Inicializando cubo 3D local...";

                // 1. Configurar Cena e Câmera
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                // 2. Renderizador
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // 3. Criar o Cubo
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                // 4. Animação
                function animate() {
                    requestAnimationFrame(animate);
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }

                // Esconde a tela de loading amarelo e mostra o cubo
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                    animate();
                }, 600);

                // 5. Ajuste de Janela
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                console.error(error);
                loaderText.innerHTML = "<span style='color:#ff3333;'>Erro no script:</span><br>" + error.message;
            }
        });
    </script>
</body>
</html>
