<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 100% Local</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Tela de Loading */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; border-top: 5px solid #00d2ff;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 16px; letter-spacing: 2px; text-align: center; padding: 0 20px; line-height: 1.5; }
    </style>

    <!-- Mapeamento para o navegador entender a importação local -->
    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Carregando arquivos do repositório local...</div>
    </div>

    <script type="module">
        // Importa diretamente do arquivo local mapeado acima
        import * as THREE from 'three';

        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');

        try {
            loaderText.innerText = "Verificando componentes 3D locais...";

            // 1. Configurar Cena e Câmera
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // 2. Renderizador (Suporta WebGL/WebGPU automaticamente dependendo do seu build)
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 3. Criar o Cubo
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // 4. Animação
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }

            // Oculta o loading se carregar com sucesso
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                animate();
            }, 500);

            // 5. Ajuste de Janela
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        } catch (error) {
            console.error(error);
            loaderText.innerHTML = "Erro de carregamento local:<br><span style='color:#ff3333; font-size:14px;'>Verifique se o arquivo 'js/three.module.js' foi upado corretamente no GitHub.</span>";
        }
    </script>
</body>
</html>
