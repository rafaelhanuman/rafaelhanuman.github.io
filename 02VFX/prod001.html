<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubo Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <!-- Importa o Three.js via CDN -->
    <script src="https://cloudflare.com"></script>
    
    <script>
        // 1. Criar a Cena e a Câmera
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // 2. Criar o Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 3. Criar o Cubo (Geometria + Material)
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // 4. Função de Animação
        function animate() {
            requestAnimationFrame(animate);

            // Rotaciona o cubo a cada frame
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);
        }

        // 5. Ajustar tamanho se a janela mudar de tamanho
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Iniciar animação
        animate();
    </script>
</body>
</html>
