<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubo Three.js com Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Estilo da Tela de Carregamento */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease; /* Efeito de sumir suavemente */
            color: #ffffff;
        }

        /* Animação do círculo girando */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader-text {
            font-size: 18px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- Tela de Carregamento Inicial -->
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Carregando biblioteca e modelos...</div>
    </div>

    <!-- Link estável do Three.js -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        // Executa quando todo o HTML e scripts forem processados
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loader-text');

            // 1. Validar se a biblioteca carregou
            if (typeof THREE === 'undefined') {
                loaderText.innerText = "Erro ao carregar a biblioteca Three.js!";
                loaderText.style.color = "#ff3333";
                return;
            }

            // Atualiza o texto logo antes de renderizar o cenário 3D
            loaderText.innerText = "Inicializando modelo 3D...";

            // 2. Configuração da Cena e Câmera
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // 3. Renderizador
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Criação do Cubo
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // 5. Função de Animação
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }

            // Simula um mini delay de 500ms apenas para o usuário conseguir ver o aviso piscando na tela antes do cubo aparecer
            setTimeout(() => {
                // Esconde a tela de loading sumindo com a opacidade
                loader.style.opacity = '0';
                
                // Remove totalmente do HTML após o efeito visual acabar
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);

                // Inicia a renderização do cubo
                animate();
            }, 500);

            // 6. Ajuste de Tela (Responsivo)
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
