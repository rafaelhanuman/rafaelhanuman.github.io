<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Diagnóstico Avançado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; 
            border-top: 5px solid #ffcc00; /* Carregador Amarelo */
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 15px; letter-spacing: 1px; text-align: center; padding: 0 20px; line-height: 1.6; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Iniciando teste de arquivos locais...</div>
    </div>

    <!-- Script configurado como módulo moderno -->
    <script type="module">
        const loaderText = document.getElementById('loader-text');

        function debug(msg) {
            loaderText.innerText = msg;
            console.log("[DEBUG 3D]: " + msg);
        }

        // Função assíncrona para permitir o rastreamento real do carregamento do arquivo
        async function inicializar3D() {
            try {
                debug("Passo 1: Solicitando arquivo './js/three.module.js' ao servidor do GitHub...");
                
                // Importação dinâmica (força o navegador a capturar o erro exato se falhar)
                const THREE = await import('./js/three.module.js');
                
                debug("Passo 2: Arquivo lido com sucesso! Criando Scene...");
                const scene = new THREE.Scene();

                debug("Passo 3: Criando a Câmera...");
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                debug("Passo 4: Inicializando o WebGLRenderer...");
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                debug("Passo 5: Criando a geometria do Cubo...");
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                debug("Passo 6: Iniciando renderização do cenário...");
                function animate() {
                    requestAnimationFrame(animate);
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }

                debug("Passo 7: Removendo tela de loading...");
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                    animate();
                }, 800);

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                console.error("Erro capturado:", error);
                
                // Exibe o motivo real na tela para sabermos o porquê do bloqueio
                loaderText.innerHTML = "<span style='color:#ff3333; font-weight:bold; font-size:16px;'>O NAVEGADOR BLOQUEOU O ARQUIVO:</span><br><br>" + 
                                       "<b>Mensagem do Erro:</b> " + error.message + "<br><br>" +
                                       "<span style='color:#aaa; font-size:13px;'>Se o erro mencionar 'CORS' ou 'URL', você está abrindo o arquivo direto do seu PC dando dois cliques nele. Para funcionar no PC, precisa de um servidor local (Live Server), mas se você enviar esse código exato para o GitHub Pages ele vai rodar direto por lá!</span>";
            }
        }

        // Executa o teste
        inicializar3D();
    </script>
</body>
</html>
