    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #111; font-family: sans-serif; }
        
        /* Ajuste do Canvas para preencher estritamente a div CONTAINER_ITEM25 */
        .CONTAINER_ITEM25 canvas { display: block; width: 100% !important; height: 100% !important; }

        /* Estilo da caixa onde o 3D vai rodar */
        .CONTAINER_ITEM25 {
            width: 100%;
            height: 450px; /* Você pode alterar a altura da área 3D mudando este valor */
            background-color: #050505;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Mini Spinner de Loading Interno exclusivo para a div */
        .box-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 45px; height: 45px;
            border: 4px solid #222; 
            border-top: 4px solid #00ff66; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-size: 14px; letter-spacing: 1px; color: #00ff66; text-align: center; }
    </style>
