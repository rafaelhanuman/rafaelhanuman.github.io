<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.WebGPU Local Completo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Tela de Loading */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            color: #ffffff;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loader-text {
            font-size: 16px;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
            color: #00ff66;
        }
    </style>

    <!-- O MAPA ABAIXO CORRIGE OS ERROS 404 INTERNOS DO GLTFLOADER REDIRECIONANDO PARA SEU ARQUIVO LOCAL -->
    <script type="importmap">
    {
        "imports": {
            "three": "./js/three.webgpu.js",
            "three/webgpu": "./js/three.webgpu.js",
            "three/tsl": "./js/three.tsl.js",
            "three/nodes": "./js/three.webgpu.js",
            "three/addons/utils/SkeletonUtils.js": "./js/three.webgpu.js",
            "three/addons/utils/BufferGeometryUtils.js": "./js/three.webgpu.js",
            "../utils/SkeletonUtils.js": "./js/three.webgpu.js",
            "../utils/BufferGeometryUtils.js": "./js/three.webgpu.js"
        }
    }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Carregando módulos locais e corrigindo dependências de 'js/'...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const loaderText = document.getElementById('loader-text');
        const loader = document.getElementById('loader');

        async function init() {
            try {
                // 1. Criação da Cena e Câmera
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                // 2. Inicialização do Renderizador WebGPU
                const renderer = new THREE.WebGPURenderer({ antialias: true });
                if (typeof renderer.init === 'function') {
                    await renderer.init();
                }
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // 3. Criar o Cubo no centro da tela
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                // 4. Loop de Animação
                function animate() {
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }

                // Oculta a interface de carregamento e engaja o loop nativo do WebGPU
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        renderer.setAnimationLoop(animate);
                    }, 500);
                }, 400);

                // 5. Ajuste de Redimensionamento da Tela
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                console.error("Erro capturado:", error);
                loaderText.innerHTML = "<span style='color:#ff3333; font-weight:bold;'>FALHA NA INICIALIZAÇÃO:</span><br><br>" + error.message + "<br><br>" + "<small style='color:#bbb;'>Certifique-se de que os arquivos 'three.webgpu.js' e 'three.tsl.js' estão na pasta 'js/' e que está usando um servidor local (Live Server).</small>";
            }
        }

        init();
    </script>
</body>
</html>
