<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.WebGPU - Vitrine de Produtos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #111; font-family: sans-serif; color: #ffffff; padding: 40px 20px; }

        /* EXEMPLO DE VITRINE EM GRID (Ajuste conforme o seu layout) */
        .vitrine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .produto-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .produto-card h3 {
            margin-top: 15px;
            font-size: 18px;
            color: #00ff66;
            letter-spacing: 1px;
        }

        /* ESTAS SÃO AS DIVS QUE ANTES TINHAM FOTOS E AGORA SÃO CONTAINERS 3D */
        .produto-3d-box {
            width: 100%;
            height: 300px; /* Controle a altura da caixa por aqui */
            background-color: #050505;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* Spinner de Loading Interno para cada caixinha */
        .box-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.4s ease;
        }
        
        .spinner {
            width: 35px; height: 35px;
            border: 4px solid #222; 
            border-top: 4px solid #00ff66; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-size: 12px; color: #00ff66; text-align: center; padding: 0 10px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.webgpu.js",
                "three/tsl": "./js/three.tsl.js",
                "three/nodes": "./js/three.webgpu.nodes.js",
                "three/addons/loaders/GLTFLoader.js": "./js/GLTFLoader.js"
            }
        }
    </script>
</head>
<body>

    <h2 style="text-align: center; margin-bottom: 40px; letter-spacing: 2px;">PRODUTOS 3D INTERATIVOS</h2>

    <!-- GRID DE EXEMPLO: Substitua ou adapte com as suas divs atuais -->
    <div class="vitrine-grid">
        
        <!-- Produto 1 -->
        <div class="produto-card">
            <div class="produto-3d-box" data-model="./js/prod002.glb">
                <div class="box-loader">
                    <div class="spinner"></div>
                    <div class="loader-text">Carregando...</div>
                </div>
            </div>
            <h3>Produto 01</h3>
        </div>

        <!-- Produto 2 (Exemplo duplicado apontando para outro modelo se tiver) -->
        <div class="produto-card">
            <div class="produto-3d-box" data-model="./js/prod002.glb">
                <div class="box-loader">
                    <div class="spinner"></div>
                    <div class="loader-text">Carregando...</div>
                </div>
            </div>
            <h3>Produto 02</h3>
        </div>

    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Captura todas as caixas de fotos convertidas
        const containers = document.querySelectorAll('.produto-3d-box');

        containers.forEach(async (container) => {
            const modelPath = container.getAttribute('data-model');
            if (!modelPath) return;

            const txtLoader = container.querySelector('.loader-text');
            const visualLoader = container.querySelector('.box-loader');

            try {
                // 1. Configuração do Cenário Individualizado
                const scene = new THREE.Scene();
                
                // Dimensões extraídas diretamente do tamanho da DIV HTML
                let width = container.clientWidth;
                let height = container.clientHeight;
                
                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
                camera.position.set(0, 1.5, 4); 

                // 2. Renderizador WebGPU atrelado à DIV
                const renderer = new THREE.WebGPURenderer({ antialias: true });
                await renderer.init(); 
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // 3. Sistema de Iluminação
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5); 
                directionalLight.position.set(5, 10, 7);
                scene.add(directionalLight);

                // 4. Grupo âncora para centralização perfeita no eixo local
                const meshGroup = new THREE.Group();
                scene.add(meshGroup);

                // 5. Carregador GLTF
                const gltfLoader = new GLTFLoader();
                
                gltfLoader.load(
                    modelPath, 
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // Centralização geométrica baseada no Grupo
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        
                        model.position.set(-center.x, -center.y, -center.z);
                        meshGroup.add(model);

                        // Remove o loader individual da caixinha
                        setTimeout(() => {
                            if (visualLoader) {
                                visualLoader.style.opacity = '0';
                                setTimeout(() => visualLoader.remove(), 400);
                            }
                            animate();
                        }, 200);
                    },
                    (xhr) => {
                        if (txtLoader) {
                            if (xhr.total > 0) {
                                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                                txtLoader.innerText = `${percent}%`;
                            } else {
                                txtLoader.innerText = `${Math.round(xhr.loaded / 1024)} KB`;
                            }
                        }
                    },
                    (error) => {
                        console.error('Erro ao ler o arquivo:', modelPath, error);
                        if (txtLoader) txtLoader.innerHTML = "<span style='color:#ff3333;'>Erro GLTF</span>";
                    }
                );

                // 6. Loop Assíncrono WebGPU isolado por container
                async function animate() {
                    requestAnimationFrame(animate);
                    if (meshGroup) {
                        meshGroup.rotation.y += 0.01; 
                    }
                    await renderer.renderAsync(scene, camera);
                }

                // 7. Redimensionamento responsivo focado na Div
                window.addEventListener('resize', () => {
                    width = container.clientWidth;
                    height = container.clientHeight;
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                });

            } catch (error) {
                console.error("Erro crítico no container:", error);
            }
        });
    </script>
</body>
</html>
