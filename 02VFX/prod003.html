    <!-- Módulo Script contendo o Motor Gráfico Three.WebGPU parametrizado para a Div -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.querySelector('.CONTAINER_ITEM25');
        const modelPath = container ? container.getAttribute('data-model') : null;
        const txtLoader = container ? container.querySelector('.loader-text') : null;
        const visualLoader = container ? container.querySelector('.box-loader') : null;
        
        let meshGroup; 

        async function init() {
            if (!container || !modelPath) return;

            try {
                // 1. Configuração do Cenário baseado na Div física
                const scene = new THREE.Scene();
                
                let width = container.clientWidth;
                let height = container.clientHeight;
                
                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
                camera.position.set(0, 1.5, 4); 

                // 2. Renderizador Assíncrono WebGPU atrelado à Div CONTAINER_ITEM25
                const renderer = new THREE.WebGPURenderer({ antialias: true });
                await renderer.init(); 
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // 3. Sistema de Iluminação
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5); 
                directionalLight.position.set(5, 10, 7);
                scene.add(directionalLight);

                // 4. Grupo âncora para centralização geométrica perfeita
                meshGroup = new THREE.Group();
                scene.add(meshGroup);

                // 5. Carregamento do arquivo local configurado no data-model
                const gltfLoader = new GLTFLoader();
                
                gltfLoader.load(
                    modelPath, 
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // Cálculo preciso do centro do objeto
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        
                        // Recentraliza para rotacionar perfeitamente no próprio eixo
                        model.position.set(-center.x, -center.y, -center.z);
                        meshGroup.add(model);

                        // Esconde o mini loading interno e inicia a rotação
                        setTimeout(() => {
                            if (visualLoader) {
                                visualLoader.style.opacity = '0';
                                setTimeout(() => visualLoader.remove(), 500);
                            }
                            animate();
                        }, 200);
                    },
                    (xhr) => {
                        if (txtLoader) {
                            if (xhr.total > 0) {
                                const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                                txtLoader.innerText = `Processando: ${percentComplete}%`;
                            } else {
                                const loadedKB = Math.round(xhr.loaded / 1024);
                                txtLoader.innerText = `Carregando: ${loadedKB} KB`;
                            }
                        }
                    },
                    (error) => {
                        console.error('Falha de leitura do arquivo GLTF:', error);
                        if (txtLoader) txtLoader.innerHTML = "<span style='color:#ff3333; font-weight:bold;'>Erro ao carregar o arquivo 3D</span>";
                    }
                );

                // 6. Loop de Renderização e Animação Assíncrono (WebGPU)
                async function animate() {
                    requestAnimationFrame(animate);
                    if (meshGroup) {
                        meshGroup.rotation.y += 0.01; 
                    }
                    await renderer.renderAsync(scene, camera);
                }

                // 7. Redimensionamento Responsivo focado no Container
                window.addEventListener('resize', () => {
                    width = container.clientWidth;
                    height = container.clientHeight;
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                });

            } catch (error) {
                console.error("Erro crítico interceptado:", error);
            }
        }

        init();
    </script>
