<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.WebGPU - Prod001</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Tela de Loading Verde */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333; 
            border-top: 5px solid #00ff66; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 16px; letter-spacing: 2px; text-align: center; padding: 0 20px; line-height: 1.5; color: #00ff66; }
    </style>

    <!-- Mapeamento unificado: Garante que o GLTFLoader local também use as dependências WebGPU da mesma pasta -->
    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.webgpu.js",
                "three/tsl": "./js/three.tsl.js",
                "three/nodes": "./js/three.webgpu.nodes.js",
                "three/addons/loaders/GLTFLoader.js": "./js/GLTFLoader.js"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Carregando modelo 3D 'prod002.gltf'...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const loaderText = document.getElementById('loader-text');
        const loader = document.getElementById('loader');
        
        let meshGLTF; 

        async function init() {
            try {
                // 1. Configuração do Cenário
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 2, 5); 

                // 2. Renderizador Assíncrono WebGPU
                const renderer = new THREE.WebGPURenderer({ antialias: true });
                await renderer.init(); 
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // 3. Sistema de Iluminação (Indispensável para visualização de materiais do GLTF)
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5); 
                directionalLight.position.set(5, 10, 7);
                scene.add(directionalLight);

                // 4. Carregamento do arquivo local prod002.gltf
                const gltfLoader = new GLTFLoader();
                
                gltfLoader.load(
                    './prod002.gltf', 
                    (gltf) => {
                        meshGLTF = gltf.scene;
                        
                        // Correção: Cálculo preciso de bounding box para transladar o centro do modelo para o ponto (0,0,0)
                        const box = new THREE.Box3().setFromObject(meshGLTF);
                        const center = box.getCenter(new THREE.Vector3());
                        meshGLTF.position.x -= center.x;
                        meshGLTF.position.y -= center.y;
                        meshGLTF.position.z -= center.z;

                        scene.add(meshGLTF);

                        // Esconde o loading verde e inicia a rotação do produto
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 500);
                            animate();
                        }, 400);
                    },
                    (xhr) => {
                        if (xhr.total > 0) {
                            const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                            loaderText.innerText = `Processando modelo: ${percentComplete}%`;
                        } else {
                            // Fallback caso o servidor não envie o cabeçalho Content-Length
                            const loadedKB = Math.round(xhr.loaded / 1024);
                            loaderText.innerText = `Carregando dados: ${loadedKB} KB transferidos`;
                        }
                    },
                    (error) => {
                        console.error('Falha interna de leitura do arquivo GLTF:', error);
                        showError("Não foi possível processar o arquivo 'prod002.gltf'. Verifique a integridade ou a existência do arquivo na pasta raiz.");
                    }
                );

                // 5. Loop de Renderização e Animação
                function animate() {
                    requestAnimationFrame(animate);
                    if (meshGLTF) {
                        meshGLTF.rotation.y += 0.01; 
                    }
                    renderer.render(scene, camera);
                }

                // 6. Monitoramento de Janela Dinâmico
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                console.error("Erro crítico interceptado:", error);
                showError(error.message);
            }
        }

        // Função auxiliar para exibir mensagens de falha na interface gráfica
        function showError(message) {
            loaderText.innerHTML = "<span style='color:#ff3333; font-weight:bold;'>ERRO NO MOTOR GRÁFICO:</span><br><br>" + 
                                   message + "<br><br>" +
                                   "<small style='color:#bbb;'>Se o erro persistir, certifique-se de usar um servidor local (HTTP) e que o arquivo 'prod002.gltf' está na mesma pasta do 'index.html'.</small>";
        }

        init();
    </script>
</body>
</html>
