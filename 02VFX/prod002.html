<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.WebGPU - Prod002</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #0d0d0d; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Tela de Carregamento */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0d0d0d;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease; color: #ffffff;
        }
        
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #1a1a1a; 
            border-top: 4px solid #00ff66; 
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { font-size: 14px; letter-spacing: 2px; text-align: center; padding: 0 20px; line-height: 1.6; color: #00ff66; font-weight: 500; }
    </style>

    <!-- Mapeamento Completo e Atualizado incluindo SkeletonUtils -->
    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.webgpu.js",
                "three/tsl": "./js/three.tsl.js",
                "three/nodes": "./js/three.webgpu.nodes.js",
                "three/addons/loaders/GLTFLoader.js": "./js/GLTFLoader.js",
                "three/addons/controls/OrbitControls.js": "./js/OrbitControls.js",
                "three/addons/utils/SkeletonUtils.js": "./js/SkeletonUtils.js",
                "three/addons/utils/BufferGeometryUtils.js": "./js/BufferGeometryUtils.js"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Inicializando motor WebGPU...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const loaderText = document.getElementById('loader-text');
        const loader = document.getElementById('loader');
        
        let meshGLTF, renderer, scene, camera, controls;

        async function init() {
            try {
                // 1. Cenário e Câmera
                scene = new THREE.Scene();
                scene.background = new THREE.Color('#0d0d0d');

                camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(0, 1.5, 4.5); 

                // 2. Renderizador Assíncrono WebGPU
                renderer = new THREE.WebGPURenderer({ antialias: true });
                await renderer.init(); 
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                document.body.appendChild(renderer.domElement);

                // 3. Controle de Órbita (Mouse / Touch)
                controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;

                // 4. Configuração de Luz para Estúdio de Produto
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); 
                scene.add(ambientLight);

                const keyLight = new THREE.DirectionalLight(0xffffff, 3.5); 
                keyLight.position.set(5, 5, 4);
                scene.add(keyLight);

                const fillLight = new THREE.DirectionalLight(0xffffff, 1.5); 
                fillLight.position.set(-5, 2, 2);
                scene.add(fillLight);

                const rimLight = new THREE.DirectionalLight(0xffffff, 2.0);
                rimLight.position.set(0, 4, -5);
                scene.add(rimLight);

                // 5. Carregamento do Arquivo na pasta './js/prod002.gltf'
                loaderText.innerText = "Buscando 'prod002.gltf' na pasta js/...";
                const gltfLoader = new GLTFLoader();
                
                gltfLoader.load(
                    './js/prod002.gltf', 
                    (gltf) => {
                        meshGLTF = gltf.scene;
                        
                        // Centralização automática
                        const box = new THREE.Box3().setFromObject(meshGLTF);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());

                        meshGLTF.position.x -= center.x;
                        meshGLTF.position.y -= center.y;
                        meshGLTF.position.z -= center.z;

                        scene.add(meshGLTF);

                        // Ajuste dinâmico do enquadramento baseado no tamanho real do objeto
                        const maxDim = Math.max(size.x, size.y, size.z);
                        camera.position.z = maxDim * 2.5;
                        controls.target.set(0, 0, 0);

                        // Transição da tela de loading
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 500);
                            animate();
                        }, 300);
                    },
                    (xhr) => {
                        if (xhr.total > 0) {
                            const percent = Math.round((xhr.loaded / xhr.total) * 100);
                            loaderText.innerText = `Processando: ${percent}%`;
                        } else {
                            const loadedKB = Math.round(xhr.loaded / 1024);
                            loaderText.innerText = `Lendo dados: ${loadedKB} KB`;
                        }
                    },
                    (error) => {
                        console.error('Erro ao ler o arquivo GLTF:', error);
                        showError("Não foi possível renderizar o arquivo 'prod002.gltf'. Verifique se o arquivo não depende de texturas externas ausentes.");
                    }
                );

                // Redimensionamento responsivo de tela
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                console.error("Erro no WebGPU:", error);
                showError(error.message);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        function showError(message) {
            loaderText.innerHTML = "<span style='color:#ff3333; font-weight:bold;'>ERRO DETECTADO:</span><br><br>" + 
                                   "<span style='color:#eee; font-size:13px;'>" + message + "</span>";
        }

        init();
    </script>
</body>
</html>
